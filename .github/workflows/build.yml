name: DiyalizPro Build
on:
  workflow_dispatch:
    push:
        branches: [ main ]
        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v4
                                      - name: Setup Java
                                              uses: actions/setup-java@v3
                                                      with:
                                                                distribution: 'zulu'
                                                                          java-version: '17'
                                                                                - name: Setup Flutter
                                                                                        uses: subosito/flutter-action@v2
                                                                                                with:
                                                                                                          channel: 'stable'
                                                                                                                    flutter-version: '3.19.0'
                                                                                                                          - name: Install dependencies
                                                                                                                                  run: flutter pub get
                                                                                                                                        - name: Build APK
                                                                                                                                                run: flutter build apk --release --no-tree-shake-icons --dart-define=BASE_URL=${{ vars.BASE_URL || 'https://www.diyalizpro.com' }}
                                                                                                                                                      - name: Upload APK
                                                                                                                                                              uses: actions/upload-artifact@v4
                                                                                                                                                                      with:
                                                                                                                                                                                name: DiyalizPro-Release-APK
                                                                                                                                                                                          path: build/app/outputs/flutter-apk/app-release.apk
                                                                                                                                                                                          
