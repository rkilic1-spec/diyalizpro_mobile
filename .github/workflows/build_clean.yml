name: Build
on:
  workflow_dispatch:
    push:
        branches: [ main ]
        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-java@v3
                                      with:
                                                distribution: 'zulu'
                                                          java-version: '17'
                                                                - uses: subosito/flutter-action@v2
                                                                        with:
                                                                                  channel: 'stable'
                                                                                            flutter-version: '3.19.0'
                                                                                                  - run: flutter pub get
                                                                                                        - run: flutter build apk --release --no-tree-shake-icons --dart-define=BASE_URL=${{ vars.BASE_URL || 'https://www.diyalizpro.com' }}
                                                                                                              - uses: actions/upload-artifact@v4
                                                                                                                      with:
                                                                                                                                name: APK
                                                                                                                                          path: build/app/outputs/flutter-apk/app-release.apk
                                                                                                                                          
